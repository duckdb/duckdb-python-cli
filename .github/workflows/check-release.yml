name: Check for new DuckDB release

on:
  schedule:
    - cron: "0 3 * * *" # every night at 3:00 UTC
  workflow_dispatch: # allow manual trigger
    inputs:
      environment:
        description: "Target PyPI environment"
        required: true
        type: choice
        options:
          - pypi-test
          - pypi
        default: pypi-test

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.duckdb.outputs.version }}
      published: ${{ steps.pypi.outputs.published }}
    steps:
      - name: Get latest stable DuckDB release
        id: duckdb
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(gh api repos/duckdb/duckdb/releases/latest --jq '.tag_name' | sed 's/^v//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Latest DuckDB release: $version"

      - name: Check if already published on PyPI
        id: pypi
        run: |
          if [ "${{ inputs.environment }}" = "pypi" ]; then
            pypi_url="https://pypi.org/pypi/duckdb-cli/${{ steps.duckdb.outputs.version }}/json"
          else
            pypi_url="https://test.pypi.org/pypi/duckdb-cli/${{ steps.duckdb.outputs.version }}/json"
          fi
          status=$(curl -s -o /dev/null -w '%{http_code}' "$pypi_url")
          if [ "$status" = "200" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.duckdb.outputs.version }} already published"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.duckdb.outputs.version }} not yet published"
          fi

  publish:
    needs: check
    if: needs.check.outputs.published == 'false'
    uses: ./.github/workflows/publish.yml
    with:
      version: ${{ needs.check.outputs.version }}
      environment: ${{ inputs.environment || 'pypi' }}
